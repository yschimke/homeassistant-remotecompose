name: 'Install compose-preview CLI from source (stub)'
description: >
  Stub for the upstream "build CLI from source" action — only invoked when
  the preview-baselines / preview-comment composites are called with
  `cli-version: source`, which is internal to the compose-ai-tools repo's
  own CI. We always pin a released version via `cli-version: catalog`, so
  this path should never run; if it does, fail loudly rather than silently
  vendoring a stale source build.

runs:
  using: 'composite'
  steps:
    - shell: bash
      run: |
        echo "::error::install-cli (source build) was invoked but is not supported in this repo." >&2
        echo "::error::Set 'cli-version' to a release ('latest', a literal, or 'catalog') instead." >&2
        exit 1
