name: 'Setup JDK + Gradle'
description: >
  Temurin 21 covers both the Kotlin toolchain and the Gradle daemon (the
  Metro plugin's buildscript requires JVM runtime 21+).

inputs:
  cache-read-only:
    description: >
      Pass 'true' in release/publish jobs to prevent Gradle cache writes —
      avoids cache poisoning from untrusted PR runs.
    default: 'false'

runs:
  using: 'composite'
  steps:
    - uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: 21
    - uses: gradle/actions/setup-gradle@v6
      with:
        cache-read-only: ${{ inputs.cache-read-only }}
