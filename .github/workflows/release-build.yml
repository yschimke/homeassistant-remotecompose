name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.1)'
        required: true
        type: string
      publish_wear:
        description: 'Also publish :wear bundle to Play'
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.1)'
        required: true
        type: string
      publish_wear:
        description: 'Also publish :wear bundle to Play'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

# Required secrets:
#   SIGNING_KEYSTORE              base64 of the upload keystore (.jks)
#   HARC_KEYSTORE_PASSWORD        keystore password
#   HARC_KEY_ALIAS                key alias inside the keystore
#   HARC_KEY_PASSWORD             key password
#   PLAY_SERVICE_ACCOUNT_JSON     service account JSON; presence gates Play upload
jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      packages: write
    env:
      TAG_NAME: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
      HAS_SIGNING_KEYSTORE: ${{ secrets.SIGNING_KEYSTORE != '' }}
      HAS_PLAY_CREDENTIALS: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON != '' }}
      PUBLISH_WEAR: ${{ inputs.publish_wear || false }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
      - uses: ./.github/actions/setup
        with:
          cache-read-only: 'true'

      - name: Decode signing keystore
        if: env.HAS_SIGNING_KEYSTORE == 'true'
        env:
          SIGNING_KEYSTORE: ${{ secrets.SIGNING_KEYSTORE }}
        run: |
          set -euo pipefail
          keystore="${RUNNER_TEMP}/upload.jks"
          printf '%s' "$SIGNING_KEYSTORE" | base64 -d > "$keystore"
          echo "HARC_KEYSTORE_PATH=$keystore" >> "$GITHUB_ENV"


      - name: Write Play credentials file
        if: env.HAS_PLAY_CREDENTIALS == 'true'
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail
          creds_file="${RUNNER_TEMP}/play-service-account.json"
          printf '%s' "$PLAY_SERVICE_ACCOUNT_JSON" > "$creds_file"
          echo "ANDROID_PUBLISHER_CREDENTIALS=$creds_file" >> "$GITHUB_ENV"

      - name: Assemble release APK
        env:
          HARC_KEYSTORE_PASSWORD: ${{ secrets.HARC_KEYSTORE_PASSWORD }}
          HARC_KEY_ALIAS: ${{ secrets.HARC_KEY_ALIAS }}
          HARC_KEY_PASSWORD: ${{ secrets.HARC_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease :wear:assembleRelease --stacktrace

      - name: Assemble release bundle (Play)
        if: env.HAS_SIGNING_KEYSTORE == 'true'
        env:
          HARC_KEYSTORE_PASSWORD: ${{ secrets.HARC_KEYSTORE_PASSWORD }}
          HARC_KEY_ALIAS: ${{ secrets.HARC_KEY_ALIAS }}
          HARC_KEY_PASSWORD: ${{ secrets.HARC_KEY_PASSWORD }}
        run: ./gradlew :app:bundleRelease :wear:bundleRelease --stacktrace

      - name: Publish to Play (internal track)
        id: play_publish
        if: env.HAS_PLAY_CREDENTIALS == 'true' && env.HAS_SIGNING_KEYSTORE == 'true'
        env:
          HARC_KEYSTORE_PASSWORD: ${{ secrets.HARC_KEYSTORE_PASSWORD }}
          HARC_KEY_ALIAS: ${{ secrets.HARC_KEY_ALIAS }}
          HARC_KEY_PASSWORD: ${{ secrets.HARC_KEY_PASSWORD }}
        run: ./gradlew :app:publishBundle --stacktrace


      - name: Publish Wear to Play (internal track)
        if: env.PUBLISH_WEAR == 'true' && env.HAS_PLAY_CREDENTIALS == 'true' && env.HAS_SIGNING_KEYSTORE == 'true'
        env:
          HARC_KEYSTORE_PASSWORD: ${{ secrets.HARC_KEYSTORE_PASSWORD }}
          HARC_KEY_ALIAS: ${{ secrets.HARC_KEY_ALIAS }}
          HARC_KEY_PASSWORD: ${{ secrets.HARC_KEY_PASSWORD }}
        run: ./gradlew :wear:publishBundle --stacktrace

      - name: Release publish summary
        if: always()
        run: |
          set -euo pipefail
          {
            echo "## Release publish status"
            echo
            echo "- Tag: ${TAG_NAME}"
            echo "- Signing keystore configured: ${HAS_SIGNING_KEYSTORE}"
            echo "- Play credentials configured: ${HAS_PLAY_CREDENTIALS}"
            if [[ "${HAS_SIGNING_KEYSTORE}" == "true" && "${HAS_PLAY_CREDENTIALS}" == "true" ]]; then
              echo "- Play publish step: app attempted (internal track)"
              echo "- Wear publish enabled: ${PUBLISH_WEAR}"
            else
              echo "- Play publish step: skipped"
              echo "- Reason: release secrets were not fully configured"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Stage release assets
        id: stage
        run: |
          set -euo pipefail
          mkdir -p _release
          version="${TAG_NAME#v}"
          shopt -s nullglob
          for f in app/build/outputs/apk/release/*.apk; do
            name=$(basename "$f" .apk)
            suffix=""
            case "$name" in *-unsigned) suffix="-unsigned" ;; esac
            cp "$f" "_release/harc-${version}${suffix}.apk"
          done
          for f in app/build/outputs/bundle/release/*.aab; do
            cp "$f" "_release/harc-${version}.aab"
          done
          for f in wear/build/outputs/apk/release/*.apk; do
            name=$(basename "$f" .apk)
            suffix=""
            case "$name" in *-unsigned) suffix="-unsigned" ;; esac
            cp "$f" "_release/harc-wear-${version}${suffix}.apk"
          done
          for f in wear/build/outputs/bundle/release/*.aab; do
            cp "$f" "_release/harc-wear-${version}.aab"
          done
          ls -la _release/
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Attach assets to GitHub release
        if: github.event_name == 'push' || github.event_name == 'workflow_call'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG_NAME }}
          # The AAB only exists when SIGNING_KEYSTORE is configured;
          # `fail_on_unmatched_files` would fail every pre-signing tag
          # push otherwise. The unsigned APK glob is enough until the
          # signing secret lands.
          files: |
            _release/*.apk
            _release/*.aab

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ steps.stage.outputs.version }}
          path: _release/
