name: Claude Triage

# Weekly issue triage in automation mode: labels new issues, closes ones
# already fixed by merged PRs (with evidence), and maintains a "Weekly
# triage" summary issue with a shortlist of items ready for an agent. To
# start work on an issue, apply the `claude` label or comment
# `@claude <task>` (see claude.yml). Manual run: Actions -> Claude Triage.

on:
  schedule:
    # Friday evenings 17:00 UTC — shortlist ready for the weekend
    - cron: '0 17 * * 5'
  workflow_dispatch:

concurrency:
  group: claude-triage
  cancel-in-progress: false

jobs:
  triage:
    name: Triage open issues
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write
      pull-requests: read
      # Exchanged by the action for a short-lived Claude GitHub App token.
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so recent commits can be matched against issues.
          fetch-depth: 0
      # Pre-create the follow-up label deterministically: the GitHub MCP
      # server bundled with the pinned action (v0.17.1) ships no label
      # tools, and allowlisting label_write would also let a prompt-injected
      # issue delete or rename any repository label.
      - name: Ensure follow-up label exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create follow-up \
            --repo "$GITHUB_REPOSITORY" \
            --description "Deferred review feedback filed by weekly triage" \
            --color BFD4F2 --force
      - uses: anthropics/claude-code-action@3553f84341b92da26052e28acf1aa898f9511f32 # v1.0.177
        with:
          # Bills the Claude subscription's included usage.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: >-
            --max-turns 100
            --allowedTools "mcp__github__list_issues,mcp__github__search_issues,mcp__github__get_issue,mcp__github__issue_read,mcp__github__create_issue,mcp__github__update_issue,mcp__github__issue_write,mcp__github__add_issue_comment,mcp__github__get_issue_comments,mcp__github__list_pull_requests,mcp__github__search_pull_requests,mcp__github__get_pull_request,mcp__github__pull_request_read,mcp__github__get_pull_request_comments,mcp__github__get_pull_request_review_comments,mcp__github__get_pull_request_reviews,mcp__github__list_commits,mcp__github__search_code,Bash(git log:*),Bash(git diff:*),Bash(git show:*)"
          prompt: |
            Run the weekly issue triage for this repository. Work through ALL
            open issues (skip pull requests):

            1. Label new or unlabeled issues: bug, enhancement, question, or
               needs-info, plus priority-high only when clearly urgent.
               If a needed label does not exist and cannot be created
               with the available tools, note that in the summary instead.
            2. For each open issue, check whether it has already been
               resolved: search merged PRs and recent commits on main that
               reference or plausibly fix it. If confident it is fixed,
               comment with the evidence (PR/commit links) and close it as
               completed. If plausible but unconfirmed, comment asking the
               maintainer to confirm and apply needs-info; do not close.
            3. Maintain a single open summary issue titled "Weekly triage"
               (create it if missing, otherwise update the existing one by
               editing its body): a table of open issues with labels, a
               one-line status, and what is blocking each. End with a
               "Ready for an agent" shortlist of issues that are specified
               well enough to implement, each with a suggested kickoff:
               apply the `claude` label, or comment `@claude <one-line task>`.
            4. Review-feedback sweep: for each open PR, find unresolved
               review threads and reviewer comments that never got a reply
               or a resulting change, and list them in a "Stalled review
               feedback" section of the summary issue with links. For PRs
               merged in the last 14 days, find review comments that were
               deferred or left unaddressed at merge time (unresolved
               threads, "follow up"/"later" replies, TODOs conceded in
               discussion); for each genuine loose end, file a follow-up
               issue titled "Follow-up: <short description>" linking the PR
               and the comment. Apply the follow-up label (a workflow step
               pre-creates it); if labeling fails, file the issue unlabeled
               (the title prefix is the marker). First
               search existing issues and skip any already filed.

            Rules: do not modify code or open PRs in this run. Be
            conservative about closing - only close with concrete evidence.
            Keep all comments brief and factual.
