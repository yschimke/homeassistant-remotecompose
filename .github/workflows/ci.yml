name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Assemble (debug)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: gradle/actions/wrapper-validation@v6
      # Gradle itself (and the Metro plugin's buildscript) need JVM 21+.
      # The Kotlin toolchain stays pinned to 17 (libs.versions.toml), and
      # setup-java installs both so Gradle's toolchain discovery finds 17
      # via JAVA_HOME_17_X64 while the daemon runs on 21.
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            17
            21
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew assembleDebug --stacktrace

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      # Gradle itself (and the Metro plugin's buildscript) need JVM 21+.
      # The Kotlin toolchain stays pinned to 17 (libs.versions.toml), and
      # setup-java installs both so Gradle's toolchain discovery finds 17
      # via JAVA_HOME_17_X64 while the daemon runs on 21.
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            17
            21
      - uses: gradle/actions/setup-gradle@v6
      # `test` fans out to every module: Android library / app modules get
      # their `testDebugUnitTest`, JVM modules (`:integration`, KMP common)
      # get plain `test`. `:integration:test` also depends on
      # `:previews:renderAllPreviews`, which runs the Robolectric-backed
      # pixel-parity renders.
      - run: ./gradlew test --stacktrace
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: |
            **/build/reports/tests/**
            **/build/test-results/**
            **/build/compose-previews/renders/**

  lint:
    name: Android lint
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      # Gradle itself (and the Metro plugin's buildscript) need JVM 21+.
      # The Kotlin toolchain stays pinned to 17 (libs.versions.toml), and
      # setup-java installs both so Gradle's toolchain discovery finds 17
      # via JAVA_HOME_17_X64 while the daemon runs on 21.
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            17
            21
      - uses: gradle/actions/setup-gradle@v6
      # `lint` fans out across every Android module. Debug variant is
      # enough for CI; release-only rules (e.g. ObsoleteSdkInt on
      # targetSdk) surface the same findings.
      - run: ./gradlew lintDebug --stacktrace
      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-reports
          path: |
            **/build/reports/lint-results-*.html
            **/build/reports/lint-results-*.xml

  android-test:
    name: Instrumented tests (API 36)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        api-level: [36]
        target: [default]
        arch: [x86_64]
    steps:
      - uses: actions/checkout@v6
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      # Gradle itself (and the Metro plugin's buildscript) need JVM 21+.
      # The Kotlin toolchain stays pinned to 17 (libs.versions.toml), and
      # setup-java installs both so Gradle's toolchain discovery finds 17
      # via JAVA_HOME_17_X64 while the daemon runs on 21.
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            17
            21
      - uses: gradle/actions/setup-gradle@v6

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}-${{ matrix.target }}-${{ matrix.arch }}

      - name: Create AVD snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: ${{ matrix.arch }}
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot-load -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "Generated AVD snapshot."

      - name: Run connectedDebugAndroidTest
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: ${{ matrix.arch }}
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./gradlew connectedDebugAndroidTest --stacktrace

      - name: Upload instrumented test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-test-reports
          path: |
            **/build/reports/androidTests/**
            **/build/outputs/androidTest-results/**
          if-no-files-found: ignore
