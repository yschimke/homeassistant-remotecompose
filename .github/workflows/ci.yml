name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Assemble (debug)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: gradle/actions/wrapper-validation@v6.2.0
      # Kotlin toolchain and Gradle daemon both run on JVM 21 (libs.versions.toml).
      - uses: actions/setup-java@v5.4.0
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v6.2.0
      - run: ./gradlew assembleDebug --stacktrace

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7.0.0
      # Kotlin toolchain and Gradle daemon both run on JVM 21 (libs.versions.toml).
      - uses: actions/setup-java@v5.4.0
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v6.2.0
      # `:integration:test`'s pixel-diff suites require rendered PNGs
      # under `previews/build/compose-previews/renders/`. The
      # compose-preview Gradle plugin isn't applied to any module — its
      # `composePreviewRender` task is materialised by the CLI's
      # auto-inject init script on demand — so we install the CLI and
      # render before `./gradlew test`. (The `compose-preview` workflow
      # still publishes baselines / PR comments separately; this step is
      # local to the test job and doesn't push anything.)
      - uses: yschimke/compose-ai-tools/.github/actions/install@v0.16.43
        with:
          version: catalog
          catalog-key: compose-preview-plugin
      - name: Render @Preview composables
        # Only the `previews` module feeds `:integration:test`'s
        # pixel-diff suites (they read `previews/build/compose-previews/
        # renders/`). Render just that module — auto-detection across
        # every module otherwise trips on `demo-app`, which has no
        # `@Preview` tooling coord on its classpath and aborts the run.
        run: compose-preview show --module previews --json > /dev/null
      # `test` fans out to every module: Android library / app modules get
      # their `testDebugUnitTest`, JVM modules (`:integration`, KMP common)
      # get plain `test`.
      - run: ./gradlew test --stacktrace
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: test-reports
          path: |
            **/build/reports/tests/**
            **/build/test-results/**
            **/build/compose-previews/renders/**

  lint:
    name: Android lint
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7.0.0
      # Kotlin toolchain and Gradle daemon both run on JVM 21 (libs.versions.toml).
      - uses: actions/setup-java@v5.4.0
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v6.2.0
      # `lint` fans out across every Android module. Debug variant is
      # enough for CI; release-only rules (e.g. ObsoleteSdkInt on
      # targetSdk) surface the same findings.
      - run: ./gradlew lintDebug --stacktrace
      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: lint-reports
          path: |
            **/build/reports/lint-results-*.html
            **/build/reports/lint-results-*.xml

  android-test:
    name: Instrumented tests (API 36)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        api-level: [36]
        target: [default]
        arch: [x86_64]
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      # Kotlin toolchain and Gradle daemon both run on JVM 21 (libs.versions.toml).
      - uses: actions/setup-java@v5.4.0
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v6.2.0

      - name: AVD cache
        uses: actions/cache@v6.1.0
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}-${{ matrix.target }}-${{ matrix.arch }}

      - name: Create AVD snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2.38.0
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: ${{ matrix.arch }}
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot-load -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "Generated AVD snapshot."

      - name: Run connectedDebugAndroidTest
        uses: reactivecircus/android-emulator-runner@v2.38.0
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: ${{ matrix.arch }}
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./gradlew connectedDebugAndroidTest --stacktrace

      - name: Upload instrumented test reports
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: android-test-reports
          path: |
            **/build/reports/androidTests/**
            **/build/outputs/androidTest-results/**
          if-no-files-found: ignore
