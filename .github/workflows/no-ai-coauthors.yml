name: No AI agents

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: read

jobs:
  branch-name:
    name: Reject AI agent branch names
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check head branch
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          # Lowercase before matching so "Claude/foo" / "COPILOT/bar" can't
          # slip past the prefix rejection via capitalisation.
          head_ref_lc="${HEAD_REF,,}"
          if [[ "$head_ref_lc" =~ ^(claude|copilot|cursor|devin|codex|aider|jules|gemini)/ ]]; then
            echo "::error::Branch '$HEAD_REF' uses an AI agent prefix. Rename to 'agent/...' before opening the PR."
            exit 1
          fi
          echo "Branch name OK: $HEAD_REF"

  co-authors:
    name: Scan commits and PR body
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check for AI agent attribution
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail

          git fetch --no-tags --prune origin "+$BASE_SHA" "+$HEAD_SHA" || true

          {
            git log --format='%B%n' "$BASE_SHA..$HEAD_SHA"
            printf '%s\n' "$PR_TITLE"
            printf '%s\n' "$PR_BODY"
          } > /tmp/pr-text

          patterns='(claude|anthropic\.com|copilot|openai\.com|chatgpt|cursor\.(com|sh)|devin-ai|codex|aider|sourcegraph\.com|cody-ai|gemini-code|bard|sweep-ai|tabnine|codeium|continue\.dev|replit-ai|amazonq|amazon-q|codewhisperer|qodo|bito-ai|cognition-ai|factory\.ai|jules-ai|noreply@.*-ai|.*-bot@)'

          if grep -inEH "^[[:space:]]*co-authored-by:.*${patterns}" /tmp/pr-text; then
            echo
            echo "::error::Found AI agent attribution in commits or PR body."
            echo "Strip agent Co-authored-by trailers and AI bot emails, then force-push."
            echo "(The '_Generated by [Claude Code]_' footer and agent-session links are fine — they don't claim authorship.)"
            exit 1
          fi

          # Author / committer identity of each commit must not be an AI agent —
          # an agent email domain, or an agent *name* set literally as the
          # identity. Both sets stay in sync with the branch-prefix list (above)
          # and the co-author `patterns` (below). The name match is anchored to
          # the whole field, so humans like "Claude Martin" / "Devin Jones" and
          # GitHub App bots ("claude[bot]") pass — bots land on branches by
          # design and never reach the squash-authored main. tolower() (not gawk
          # IGNORECASE) keeps it case-insensitive on mawk, ubuntu-latest's awk.
          AGENT_NAME='(claude|codex|chatgpt|copilot|gemini|cursor|devin|aider|jules)'
          AGENT_EMAIL='@(anthropic[.]com|openai[.]com|cursor[.](sh|com)|devin[.]ai|sourcegraph[.]com|continue[.]dev|factory[.]ai)'
          git log \
            --format='%H%x09author%x09%an%x09%ae%x0a%H%x09committer%x09%cn%x09%ce' \
            "$BASE_SHA..$HEAD_SHA" > /tmp/idents
          ident_hits="$(awk -F'\t' -v nre="$AGENT_NAME" -v ere="$AGENT_EMAIL" '
            BEGIN { nre = tolower(nre); ere = tolower(ere) }
            tolower($4) ~ ere            { print; next }
            tolower($3) ~ ("^" nre "$")  { print }
          ' /tmp/idents || true)"
          if [ -n "$ident_hits" ]; then
            echo
            echo "::error::Commit author/committer identity is an AI agent (an agent email domain or an agent name)."
            printf '%s\n' "$ident_hits" >&2
            exit 1
          fi

          echo "No AI agent co-authors or agent author/committer identities detected."
